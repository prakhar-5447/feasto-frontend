<div class="breadcrumb">
    @for(crumb of breadcrumbs;track $index){
    @if($index < breadcrumbs.length -1 ){ <a [routerLink]="crumb.url">{{ crumb.label }}</a>
        }
        @if($index === breadcrumbs.length -1 ){ <span>{{ crumb.label }}</span>}
            @if($index < breadcrumbs.length -1 ){ <span> / </span>}
                }
</div>
