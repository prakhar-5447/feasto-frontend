<a class="restaurant-card" [routerLink]="'/restaurant/' + restaurant.id">
    <div class="image">
        <img loading="lazy" [src]="restaurant.image" [alt]="restaurant.name" />
        @if(restaurant.offer){
        <div class="offer">
            {{restaurant.offer}}
        </div>
        }
    </div>
    <div class="info">
        <h3>{{restaurant.name}}</h3>
        <p>{{restaurant.cuisine}}</p>
        <div class="meta">
            <span class="rating">
                ⭐ {{restaurant.rating}}
            </span>
            <span>
                ⏱ {{restaurant.time}}
            </span>
        </div>
    </div>
</a>
