<div class="page">
    @if(showCarousel()){
    <app-image-carousel></app-image-carousel>
    }
    <div class="details">
        <app-restaurant-info></app-restaurant-info>
    </div>
    <!-- Tabs -->
    <div class="tabs">
        <button routerLink="order" (click)="setTab('order')" [class.active]="activeTab==='order'">
            Order
        </button>

        <button routerLink="reviews" (click)="setTab('reviews')" [class.active]="activeTab==='reviews'">
            Reviews
        </button>

        <button routerLink="cart" (click)="setTab('cart')" [class.active]="activeTab==='cart'">
            Cart ({{ cartCount }})
        </button>
    </div>
    <router-outlet></router-outlet>
</div>
