<section class="hero">
    <div class="container">
        <div class="hero-grid">
            <div class="hero-content">
                <h2 class="hero-title">
                    Order Food from Your Favorite
                    <span class="highlight">Restaurants</span>
                </h2>
                <p class="hero-description">
                    Discover the best restaurants near you. Fast delivery, fresh food, and amazing deals!
                </p>
                <div class="hero-search">
                    <div class="search-box">
                        <div class="search-field location">
                            <fa-icon [icon]="faLocationDot"></fa-icon>
                            <input type="text" placeholder="Enter your delivery location" />
                        </div>
                        <div class="search-field">
                            <fa-icon [icon]="faMagnifyingGlass"></fa-icon> <input type="text"
                                placeholder="Search for restaurant or cuisine" />
                        </div>
                    </div>
                    <button class="search-button">
                        Find Food
                    </button>
                </div>
            </div>
            <div class="hero-image">
                <img src="https://images.unsplash.com/photo-1617194191528-9a50cf609304?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080"
                    alt="Food Delivery" />
            </div>
        </div>
    </div>
</section>
