<section class="app-promotion">
    <div class="container">
        <div class="promotion-grid">
            <div class="content">
                <div class="badge">
                    <fa-icon [icon]="faMobile"></fa-icon>
                    <span>Download Our App</span>
                </div>
                <h3>
                    Get the Feasto App for Better Experience
                </h3>
                <p>
                    Download our mobile app and get exclusive deals, faster checkout,
                    and real-time order tracking.
                </p>
                <div class="download-buttons">
                    <button class="store-btn">
                        <fa-icon [icon]="faDownload"></fa-icon>
                        <div class="text">
                            <span class="small">Download on the</span>
                            <span class="big">App Store</span>
                        </div>
                    </button>
                    <button class="store-btn">
                        <fa-icon [icon]="faDownload"></fa-icon>
                        <div class="text">
                            <span class="small">Get it on</span>
                            <span class="big">Google Play</span>
                        </div>
                    </button>
                </div>
            </div>
            <div class="image">
                <img loading="lazy" src="https://images.unsplash.com/photo-1615642036791-a9fa3dc117b2" alt="Delivery Person" />
            </div>
        </div>
    </div>
</section>
